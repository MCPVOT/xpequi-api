version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    reviewers:
      - "MCPVOT/pequi-maintainers"

  - package-ecosystem: "npm"
    directory: "/packages/api-client"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "api-client"

  - package-ecosystem: "npm"
    directory: "/packages/mcp-server"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "mcp-server"

  - package-ecosystem: "pip"
    directory: "/packages/python-sdk"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python-sdk"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
